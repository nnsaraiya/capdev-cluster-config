# Throwaway payload — the only purpose of this object is to prove the
# spoke's own local ArgoCD can sync from git independently of the hub.
# Chosen to be a plain ConfigMap in its own namespace specifically so it
# cannot collide with anything the existing push-model Applications own.
apiVersion: v1
kind: Namespace
metadata:
  name: capdev-argocd-per-spoke-test
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pull-model-proof
  namespace: capdev-argocd-per-spoke-test
data:
  proof: "synced by the spoke's own local ArgoCD, independent of the hub"
