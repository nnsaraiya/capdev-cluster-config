# Creates an Application object directly in the spoke's own (new, local)
# openshift-gitops namespace — destination.server is
# https://kubernetes.default.svc, which is LOCAL to whichever cluster this
# Application actually lands on, not the hub. This is the piece that
# proves "synced directly on the spoke, independent of the hub" — the
# spoke's own ArgoCD reconciles this from git on its own, with no ongoing
# involvement from the hub's ArgoCD or the cluster-proxy tunnel the
# existing push-model setup depends on.
#
# Points at capdev-business-apps (spoke-capdev/nginx-demo) — the real,
# canonical home for business-app workloads, NOT a throwaway test payload.
# This is the reference pattern for onboarding future apps: their manifests
# live in capdev-business-apps, and this Policy bootstraps a spoke-local
# Application that syncs them. (Earlier this pointed at a copy under
# capdev-cluster-config/argocd-per-spoke-prototype/nginx-demo-local/ purely
# to prove the mechanism in isolation; that copy has been removed now that
# the app lives in its proper place.)
#
# NOTE for Globe: because this now references capdev-business-apps, the
# spoke's local ArgoCD needs a repository-credential Secret for THAT repo
# (see README.md) — the hub still needs one for capdev-cluster-config
# (the bootstrap Application), so the two clusters need creds for
# different repos.
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: bootstrap-local-argocd
  namespace: capdev-policies
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: bootstrap-local-argocd
        spec:
          remediationAction: enforce
          severity: high
          object-templates:
            # Red Hat's OpenShift GitOps operator now defaults the ArgoCD
            # application-controller to a narrow ClusterRole: read
            # everything, but write only to a curated allow-list of API
            # groups (operators.coreos.com, config.openshift.io,
            # user.openshift.io, etc.) — NOT core/apps/route.openshift.io.
            # Confirmed live: syncing a plain Deployment/Service/Route
            # failed with "is forbidden" until this RoleBinding existed.
            # Namespace + RoleBinding are created directly by this Policy
            # (which runs with the config-policy-controller's own
            # permissions), ahead of the Application's own first sync, so
            # there's no ordering race with CreateNamespace=true.
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: nginx-demo
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: RoleBinding
                metadata:
                  name: argocd-app-controller-admin
                  namespace: nginx-demo
                roleRef:
                  apiGroup: rbac.authorization.k8s.io
                  kind: ClusterRole
                  name: admin
                subjects:
                  - kind: ServiceAccount
                    name: openshift-gitops-argocd-application-controller
                    namespace: openshift-gitops
            - complianceType: musthave
              objectDefinition:
                apiVersion: argoproj.io/v1alpha1
                kind: Application
                metadata:
                  name: nginx-demo
                  namespace: openshift-gitops
                spec:
                  project: default
                  source:
                    # TODO(globe): sandbox's real public GitHub repo, so
                    # this runs live for real here. REPLACE with Globe's
                    # actual GitLab SSH URL for capdev-business-apps
                    # (git@<gitlab-host>:<group>/capdev-business-apps.git)
                    # before/when porting. Must be SSH form, not https://,
                    # once it's GitLab — auth there is an SSH deploy key,
                    # and the SPOKE's local ArgoCD needs a repository-
                    # credential Secret with that key for capdev-business-apps
                    # before it can clone this at all (see README.md). Not
                    # needed for this public GitHub repo.
                    repoURL: https://github.com/nnsaraiya/capdev-business-apps.git
                    targetRevision: main
                    path: spoke-capdev/nginx-demo
                  destination:
                    server: https://kubernetes.default.svc
                    namespace: nginx-demo
                  syncPolicy:
                    automated:
                      prune: true
                      selfHeal: true
                    syncOptions:
                      - CreateNamespace=true
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: bootstrap-local-argocd
  namespace: capdev-policies
  annotations:
    argocd.argoproj.io/sync-wave: "0"
placementRef:
  name: capdev-policies-spoke-placement
  kind: Placement
  apiGroup: cluster.open-cluster-management.io
subjects:
  - name: bootstrap-local-argocd
    kind: Policy
    apiGroup: policy.open-cluster-management.io
