# Creates an Application object directly in the spoke's own (new, local)
# openshift-gitops namespace — destination.server is
# https://kubernetes.default.svc, which is LOCAL to whichever cluster this
# Application actually lands on, not the hub. This is the piece that
# proves "synced directly on the spoke, independent of the hub" — the
# spoke's own ArgoCD reconciles this from git on its own, with no ongoing
# involvement from the hub's ArgoCD or the cluster-proxy tunnel the
# existing push-model setup depends on.
#
# Points at nginx-demo-local/ in THIS repo (not spoke-capdev/, and not
# capdev-business-apps at all) deliberately — see README.md for why:
# pointing this at the same content the existing push-model
# spoke-capdev-bootstrap/nginx-demo Applications already own would mean
# two independent ArgoCD instances fighting over the same live objects.
# It's the same nginx-unprivileged workload as capdev-business-apps'
# nginx-demo, deployed a second, independent way — a direct, visual
# side-by-side proof that the spoke-local sync produces the same real
# result as the hub-push model, in its own non-colliding namespace.
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: bootstrap-local-argocd
  namespace: capdev-policies
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: bootstrap-local-argocd
        spec:
          remediationAction: enforce
          severity: high
          object-templates:
            # Red Hat's OpenShift GitOps operator now defaults the ArgoCD
            # application-controller to a narrow ClusterRole: read
            # everything, but write only to a curated allow-list of API
            # groups (operators.coreos.com, config.openshift.io,
            # user.openshift.io, etc.) — NOT core/apps/route.openshift.io.
            # Confirmed live: syncing a plain Deployment/Service/Route
            # failed with "is forbidden" until this RoleBinding existed.
            # Namespace + RoleBinding are created directly by this Policy
            # (which runs with the config-policy-controller's own
            # permissions), ahead of the Application's own first sync, so
            # there's no ordering race with CreateNamespace=true.
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: capdev-argocd-per-spoke-test
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: RoleBinding
                metadata:
                  name: argocd-app-controller-admin
                  namespace: capdev-argocd-per-spoke-test
                roleRef:
                  apiGroup: rbac.authorization.k8s.io
                  kind: ClusterRole
                  name: admin
                subjects:
                  - kind: ServiceAccount
                    name: openshift-gitops-argocd-application-controller
                    namespace: openshift-gitops
            - complianceType: musthave
              objectDefinition:
                apiVersion: argoproj.io/v1alpha1
                kind: Application
                metadata:
                  name: nginx-demo-pull-model
                  namespace: openshift-gitops
                spec:
                  project: default
                  source:
                    # REPLACE before applying to Globe — this repo's real
                    # GitLab SSH URL (git@<gitlab-host>:<group>/capdev-cluster-config.git).
                    # Must be SSH form, not https://, since auth is an SSH
                    # deploy key — ArgoCD also needs a repository-credential
                    # Secret with that key before it can clone this at all
                    # (see README.md).
                    repoURL: <GITLAB_SSH_REPO_URL>/capdev-cluster-config.git
                    targetRevision: main
                    path: argocd-per-spoke-prototype/nginx-demo-local
                  destination:
                    server: https://kubernetes.default.svc
                    namespace: capdev-argocd-per-spoke-test
                  syncPolicy:
                    automated:
                      prune: true
                      selfHeal: true
                    syncOptions:
                      - CreateNamespace=true
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: bootstrap-local-argocd
  namespace: capdev-policies
  annotations:
    argocd.argoproj.io/sync-wave: "0"
placementRef:
  name: capdev-policies-spoke-placement
  kind: Placement
  apiGroup: cluster.open-cluster-management.io
subjects:
  - name: bootstrap-local-argocd
    kind: Policy
    apiGroup: policy.open-cluster-management.io
