# Installs the real OpenShift GitOps Operator on every cluster matched by
# capdev-policies-spoke-placement, via a plain Subscription in
# openshift-operators — the standard documented install path, no ACM addon
# framework involved (deliberately, since that framework's gitops-addon is
# ACM 2.13+ only and Globe's hub is on 2.11). Once OLM reconciles this, the
# operator auto-creates a default ArgoCD instance in a new openshift-gitops
# namespace on that cluster — but only ever once, on first install.
#
# Confirmed live: deleting the Subscription self-heals (this Policy
# recreates it, near-instantly) and OLM reinstalls the operator fine — but
# deleting the ArgoCD custom resource itself did NOT come back, because
# nothing declared it musthave. The operator reinstalling doesn't re-create
# a default instance it thinks already exists/existed. The second
# object-template below closes that gap.
#
# spec.server.route.enabled: true is NOT a no-op default — confirmed live
# the hard way: a bare `spec: {}` recreation came back with no Route for
# the ArgoCD server (CRD's raw schema default is route disabled), even
# though the operator's own original first-time auto-provisioning had it
# enabled. "No customization was ever made" turned out to be true for
# everything except this one field. Set explicitly so a future recreation
# doesn't quietly drop server reachability.
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: install-gitops-operator
  namespace: capdev-policies
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: install-gitops-operator
        spec:
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: operators.coreos.com/v1alpha1
                kind: Subscription
                metadata:
                  name: openshift-gitops-operator
                  namespace: openshift-operators
                spec:
                  channel: latest
                  name: openshift-gitops-operator
                  source: redhat-operators
                  sourceNamespace: openshift-marketplace
                  installPlanApproval: Automatic
            - complianceType: musthave
              objectDefinition:
                apiVersion: argoproj.io/v1beta1
                kind: ArgoCD
                metadata:
                  name: openshift-gitops
                  namespace: openshift-gitops
                spec:
                  server:
                    route:
                      enabled: true
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: install-gitops-operator
  namespace: capdev-policies
  annotations:
    argocd.argoproj.io/sync-wave: "0"
placementRef:
  name: capdev-policies-spoke-placement
  kind: Placement
  apiGroup: cluster.open-cluster-management.io
subjects:
  - name: install-gitops-operator
    kind: Policy
    apiGroup: policy.open-cluster-management.io
