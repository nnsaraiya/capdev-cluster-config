# Binds the "default" ManagedClusterSet into the openshift-gitops namespace
# so a Placement created there can select managed clusters from it.
#
# CONFIRM: `oc get managedclustersets` — if your spoke was imported into a
# different set, change `spec.clusterSet` and `metadata.name` to match
# (metadata.name must equal the ManagedClusterSet name being bound).

apiVersion: cluster.open-cluster-management.io/v1beta2
kind: ManagedClusterSetBinding
metadata:
  name: default
  namespace: openshift-gitops
spec:
  clusterSet: default
