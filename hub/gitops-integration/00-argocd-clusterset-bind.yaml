# ACM gates "bind" as a separate authorization on top of normal RBAC verbs
# (enforced by the managedclustersetbindingvalidators admission webhook) —
# it exists specifically so arbitrary service accounts can't attach
# themselves to a sensitive ManagedClusterSet. ArgoCD's own application-
# controller SA needs this explicit grant before it's allowed to create the
# ManagedClusterSetBinding in 01-managedclustersetbinding.yaml, scoped to
# only the "default" set this repo actually binds.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: capdev-argocd-bind-default-clusterset
rules:
  - apiGroups: ["cluster.open-cluster-management.io"]
    resources: ["managedclustersets/bind"]
    resourceNames: ["default"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: capdev-argocd-bind-default-clusterset
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: capdev-argocd-bind-default-clusterset
subjects:
  - kind: ServiceAccount
    name: openshift-gitops-argocd-application-controller
    namespace: openshift-gitops
