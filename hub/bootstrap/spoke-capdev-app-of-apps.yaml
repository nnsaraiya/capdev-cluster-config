# Root Application — the one manually-applied piece per the "ArgoCD is the
# sole manual install" principle. Everything under spoke-capdev/ in the
# capdev-cluster-config repo (RBAC, namespaces, and later operators/oauth)
# syncs declaratively from here.
#
# destination.name (not .server): live testing against the hub showed the
# GitOpsCluster controller in this ACM build registers the spoke via the
# cluster-proxy tunnel (server = https://cluster-proxy-addon-user...:9092/
# spoke-cluster), not the spoke's direct API URL — so a destination.server
# set to the direct API URL never matches the registered cluster and ArgoCD
# reports "cluster ... not found". destination.name matches the cluster
# secret's `name` field (= the ManagedCluster name) regardless of which
# server URL/mechanism ACM used to register it.
#
# CONFIRM repoURL once you've created capdev-cluster-config under your
# GitHub account/org — update if the org/namespace differs from "nnsaraiya".

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spoke-capdev-bootstrap
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/nnsaraiya/capdev-cluster-config.git
    targetRevision: main
    path: spoke-capdev
    directory:
      recurse: true
  destination:
    name: spoke-cluster
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
