# OpenShift Groups — spoke-capdev
#
# NOTE (known interim state): these Group objects are duplicated on the hub
# and on spoke-capdev because identity is still per-cluster HTPasswd (Sprint 1
# interim). Once the hub-federated identity broker (RHSSO/Keycloak, Option B)
# is live and bound to LDAP, group membership should be sourced from LDAP
# groups instead of being hand-maintained here on each cluster. When that
# lands, only the `name:` fields below need to change to match the LDAP group
# CNs — all RBAC bindings elsewhere reference these names, not user lists,
# so the rename is a single-line diff per group.
#
# Usernames below match the local-part of each person's existing Globe email
# address (see capdev-cluster-config/README-identity.md for provisioning
# notes — HTPasswd secret itself is NOT committed to git).

